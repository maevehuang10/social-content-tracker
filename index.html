<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Social Content Tracker</title>
  <style>
    :root {
      --bg: #080b10;
      --panel: #101620;
      --panel-soft: #141d2a;
      --line: #263241;
      --text: #eef3f8;
      --muted: #8f9aaa;
      --weak: #5f6b79;
      --green: #ff6fb1;
      --blue: #c084fc;
      --amber: #ffb86b;
      --danger: #fb7185;
      --radius: 8px;
      --shadow: 0 18px 50px rgba(0, 0, 0, 0.35);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      background:
        linear-gradient(180deg, rgba(255, 111, 177, 0.08), transparent 320px),
        radial-gradient(circle at top right, rgba(192, 132, 252, 0.15), transparent 360px),
        var(--bg);
      color: var(--text);
      font-family: "PingFang SC", system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    button,
    input,
    select,
    textarea {
      font: inherit;
    }

    button {
      cursor: pointer;
    }

    a {
      color: inherit;
    }

    .app {
      width: min(1180px, 100%);
      margin: 0 auto;
      padding: 18px;
    }

    .topbar {
      position: sticky;
      top: 0;
      z-index: 10;
      margin: -18px -18px 18px;
      padding: 12px 18px;
      background: rgba(8, 11, 16, 0.86);
      border-bottom: 1px solid rgba(255, 255, 255, 0.07);
      backdrop-filter: blur(18px);
    }

    .topbar-inner {
      width: min(1180px, 100%);
      margin: 0 auto;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 10px;
      min-width: 0;
    }

    .brand-mark {
      width: 11px;
      height: 11px;
      border-radius: 999px;
      background: var(--green);
      box-shadow: 0 0 22px rgba(255, 111, 177, 0.75);
      flex: 0 0 auto;
    }

    .brand-title {
      margin: 0;
      font-size: 16px;
      letter-spacing: 0.04em;
      white-space: nowrap;
    }

    .brand-subtitle {
      margin: 2px 0 0;
      color: var(--weak);
      font-size: 12px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .top-actions {
      display: flex;
      gap: 8px;
      flex: 0 0 auto;
    }

    .btn {
      border: 1px solid rgba(255, 255, 255, 0.12);
      background: rgba(255, 255, 255, 0.04);
      color: var(--text);
      border-radius: 6px;
      min-height: 36px;
      padding: 8px 12px;
      transition: border-color 0.18s, background 0.18s, color 0.18s;
    }

    .btn:hover {
      border-color: rgba(255, 111, 177, 0.45);
      color: var(--green);
      background: rgba(255, 111, 177, 0.08);
    }

    .btn-primary {
      border-color: rgba(255, 111, 177, 0.42);
      background: rgba(255, 111, 177, 0.13);
      color: var(--green);
    }

    .layout {
      display: grid;
      grid-template-columns: 280px 1fr;
      gap: 18px;
      align-items: start;
    }

    .panel {
      background: rgba(16, 22, 32, 0.88);
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
    }

    .filters {
      position: sticky;
      top: 76px;
      padding: 16px;
    }

    .section-title {
      margin: 0 0 10px;
      color: var(--muted);
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    .field {
      margin-bottom: 14px;
    }

    .field label {
      display: block;
      margin-bottom: 7px;
      color: var(--muted);
      font-size: 12px;
    }

    .input,
    .select {
      width: 100%;
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 6px;
      background: rgba(8, 11, 16, 0.64);
      color: var(--text);
      min-height: 40px;
      padding: 9px 11px;
      outline: none;
    }

    .input:focus,
    .select:focus {
      border-color: rgba(255, 111, 177, 0.55);
      box-shadow: 0 0 0 3px rgba(255, 111, 177, 0.13);
    }

    .chip-group {
      display: flex;
      flex-wrap: wrap;
      gap: 7px;
    }

    .chip {
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.035);
      color: var(--muted);
      padding: 7px 10px;
      font-size: 12px;
    }

    .chip.active {
      border-color: rgba(255, 111, 177, 0.52);
      background: rgba(255, 111, 177, 0.11);
      color: var(--green);
    }

    .main {
      min-width: 0;
    }

    .summary {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 10px;
      margin-bottom: 14px;
    }

    .stat {
      padding: 14px;
    }

    .stat strong {
      display: block;
      color: var(--green);
      font-size: 25px;
      line-height: 1;
    }

    .stat span {
      display: block;
      margin-top: 6px;
      color: var(--weak);
      font-size: 12px;
    }

    .toolbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 14px;
      padding: 12px 14px;
    }

    .result-title {
      margin: 0;
      font-size: 14px;
      color: var(--muted);
    }

    .cards {
      display: grid;
      gap: 12px;
    }

    .card {
      padding: 16px;
      overflow: hidden;
    }

    .card-head {
      display: flex;
      align-items: start;
      justify-content: space-between;
      gap: 12px;
    }

    .source {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      gap: 8px;
      margin-bottom: 8px;
      color: var(--weak);
      font-size: 12px;
    }

    .dot {
      width: 5px;
      height: 5px;
      border-radius: 50%;
      background: var(--green);
      box-shadow: 0 0 10px rgba(255, 111, 177, 0.7);
    }

    .score {
      flex: 0 0 auto;
      min-width: 44px;
      border: 1px solid rgba(255, 184, 107, 0.34);
      border-radius: 6px;
      color: var(--amber);
      background: rgba(255, 184, 107, 0.1);
      text-align: center;
      padding: 7px 8px;
      font-weight: 700;
    }

    .card h2 {
      margin: 0;
      font-size: 17px;
      line-height: 1.45;
    }

    .value {
      margin: 10px 0 12px;
      color: #b8c0ca;
      font-size: 14px;
      line-height: 1.7;
    }

    .source-summary {
      margin: 0 0 12px;
      padding: 11px 12px;
      border-left: 3px solid rgba(255, 111, 177, 0.62);
      border-radius: 6px;
      background: rgba(255, 255, 255, 0.035);
    }

    .source-summary strong {
      display: block;
      margin-bottom: 5px;
      color: var(--green);
      font-size: 12px;
      letter-spacing: 0.04em;
    }

    .source-summary p {
      margin: 0;
      color: #d4dbe6;
      font-size: 13px;
      line-height: 1.7;
    }

    .meta-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      flex-wrap: wrap;
    }

    .tag-list,
    .platform-list {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
    }

    .tag,
    .platform {
      border-radius: 999px;
      padding: 4px 8px;
      font-size: 11px;
    }

    .tag {
      border: 1px solid rgba(192, 132, 252, 0.28);
      color: #dabaff;
      background: rgba(192, 132, 252, 0.1);
    }

    .platform {
      border: 1px solid rgba(255, 111, 177, 0.24);
      color: var(--green);
      background: rgba(255, 111, 177, 0.08);
    }

    .card-actions {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }

    .small-btn {
      min-height: 31px;
      padding: 6px 9px;
      font-size: 12px;
    }

    .source-link {
      text-decoration: none;
    }

    .danger-btn {
      border-color: rgba(251, 113, 133, 0.58);
      color: #fff1f4;
      background: linear-gradient(180deg, rgba(251, 113, 133, 0.32), rgba(190, 24, 93, 0.24));
      box-shadow: 0 0 0 1px rgba(251, 113, 133, 0.12), 0 10px 24px rgba(190, 24, 93, 0.22);
      font-weight: 700;
      min-width: 74px;
    }

    .danger-btn:hover {
      border-color: rgba(251, 113, 133, 0.8);
      color: #ffffff;
      background: linear-gradient(180deg, rgba(251, 113, 133, 0.42), rgba(190, 24, 93, 0.34));
      box-shadow: 0 0 0 1px rgba(251, 113, 133, 0.18), 0 14px 30px rgba(190, 24, 93, 0.3);
    }

    .draft {
      display: none;
      margin-top: 14px;
      border-top: 1px solid rgba(255, 255, 255, 0.08);
      padding-top: 14px;
    }

    .card.open .draft {
      display: block;
    }

    .draft-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }

    .draft-box {
      background: rgba(8, 11, 16, 0.58);
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 6px;
      padding: 12px;
    }

    .draft-box h3 {
      margin: 0 0 8px;
      color: var(--muted);
      font-size: 12px;
      letter-spacing: 0.04em;
      text-transform: uppercase;
    }

    .draft-box p {
      margin: 0;
      color: #d8dee7;
      font-size: 13px;
      line-height: 1.75;
      white-space: pre-line;
    }

    .empty {
      display: none;
      padding: 40px 18px;
      text-align: center;
      color: var(--muted);
    }

    .empty.show {
      display: block;
    }

    .toast {
      position: fixed;
      left: 50%;
      bottom: 18px;
      transform: translateX(-50%) translateY(20px);
      opacity: 0;
      pointer-events: none;
      border: 1px solid rgba(255, 111, 177, 0.38);
      border-radius: 999px;
      background: rgba(8, 11, 16, 0.92);
      color: var(--green);
      padding: 10px 14px;
      box-shadow: var(--shadow);
      transition: opacity 0.2s, transform 0.2s;
      font-size: 13px;
    }

    .toast.show {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }

    @media (max-width: 860px) {
      .layout {
        grid-template-columns: 1fr;
      }

      .filters {
        position: static;
      }
    }

    @media (max-width: 640px) {
      .app {
        padding: 12px;
      }

      .topbar {
        margin: -12px -12px 12px;
        padding: 10px 12px;
      }

      .brand-title {
        font-size: 14px;
      }

      .brand-subtitle {
        max-width: 190px;
      }

      .top-actions .btn {
        padding: 7px 9px;
        font-size: 12px;
      }

      .summary {
        grid-template-columns: 1fr;
      }

      .toolbar {
        align-items: stretch;
        flex-direction: column;
      }

      .card-head {
        align-items: stretch;
        flex-direction: column;
      }

      .score {
        width: max-content;
      }

      .draft-grid {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>

    const state = {
      platform: "all",
      format: "all"
    };

    const cardsEl = document.getElementById("cards");
    const searchInput = document.getElementById("searchInput");
    const productSelect = document.getElementById("productSelect");
    const sortSelect = document.getElementById("sortSelect");
    const resultTitle = document.getElementById("resultTitle");
    const totalCount = document.getElementById("totalCount");
    const topScore = document.getElementById("topScore");
    const productCount = document.getElementById("productCount");
    const emptyState = document.getElementById("emptyState");
    const toast = document.getElementById("toast");

    function uniqueValues(key) {
      const values = topics.flatMap(item => Array.isArray(item[key]) ? item[key] : [item[key]]);
      return [...new Set(values)].sort();
    }

    function fillSelect() {
      productSelect.innerHTML = '<option value="all">全部产品线</option>';
      uniqueValues("product").forEach(product => {
        const option = document.createElement("option");
        option.value = product;
        option.textContent = product;
        productSelect.appendChild(option);
      });
    }

    function makeChips(containerId, values, stateKey) {
      const container = document.getElementById(containerId);
      container.innerHTML = "";
      ["all", ...values].forEach(value => {
        const button = document.createElement("button");
        button.type = "button";
        button.className = "chip" + (state[stateKey] === value ? " active" : "");
        button.textContent = value === "all" ? "全部" : value;
        button.addEventListener("click", () => {
          state[stateKey] = value;
          renderChips();
          renderCards();
        });
        container.appendChild(button);
      });
    }

    function renderChips() {
      makeChips("platformFilters", uniqueValues("platforms"), "platform");
      makeChips("formatFilters", uniqueValues("formats"), "format");
    }

    function matchesTopic(topic) {
      const keyword = searchInput.value.trim().toLowerCase();
      const text = [
        topic.title,
        topic.source,
        topic.product,
        topic.value,
        topic.summary,
        topic.hook,
        topic.tags.join(" ")
      ].join(" ").toLowerCase();

      if (keyword && !text.includes(keyword)) return false;
      if (productSelect.value !== "all" && topic.product !== productSelect.value) return false;
      if (state.platform !== "all" && !topic.platforms.includes(state.platform)) return false;
      if (state.format !== "all" && !topic.formats.includes(state.format)) return false;
      return true;
    }

    function sortTopics(list) {
      const mode = sortSelect.value;
      return [...list].sort((a, b) => {
        if (mode === "date") return new Date(b.date) - new Date(a.date);
        if (mode === "platforms") return b.platforms.length - a.platforms.length;
        return b.score - a.score;
      });
    }

    function escapeHtml(text) {
      return text
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }

    function topicToText(topic) {
      return `${topic.title}\n\nSummary: ${topic.summary || ""}\n\nHook: ${topic.hook}\n\n${topic.post}\n\nProduct: ${topic.product}\nTags: ${topic.tags.join(", ")}\nPlatforms: ${topic.platforms.join(", ")}`;
    }

    async function copyTopic(index) {
      const topic = topics[index];
      await navigator.clipboard.writeText(topicToText(topic));
      showToast("已复制英文草稿");
    }

    function isManualTopic(topic) {
      return topic.manual === true || topic.source === "Manual Input";
    }

    function loadManualTopics() {
      try {
        const saved = JSON.parse(localStorage.getItem("social-content-tracker-manual-topics") || "[]");
        return Array.isArray(saved) ? saved : [];
      } catch {
        return [];
      }
    }

    function saveManualTopics() {
      const manualTopics = topics.filter(isManualTopic);
      localStorage.setItem("social-content-tracker-manual-topics", JSON.stringify(manualTopics));
    }

    function askValue(label, value) {
      const next = prompt(label, value || "");
      return next === null ? value : next.trim();
    }

    function editTopic(index) {
      const topic = topics[index];
      if (!topic || !isManualTopic(topic)) return;

      topic.title = askValue("标题", topic.title);
      topic.product = askValue("产品线", topic.product);
      topic.value = askValue("推荐理由", topic.value);
      topic.summary = askValue("摘要", topic.summary || topic.value);
      topic.hook = askValue("Hook", topic.hook);
      topic.post = askValue("英文草稿", topic.post);
      topic.tags = askValue("标签，用英文逗号分隔", topic.tags.join(", "))
        .split(",")
        .map(item => item.trim())
        .filter(Boolean);
      topic.platforms = askValue("平台，用英文逗号分隔", topic.platforms.join(", "))
        .split(",")
        .map(item => item.trim())
        .filter(Boolean);
      topic.formats = askValue("内容形式，用英文逗号分隔", topic.formats.join(", "))
        .split(",")
        .map(item => item.trim())
        .filter(Boolean);

      saveManualTopics();
      fillSelect();
      renderChips();
      renderCards();
      showToast("已保存修改");
    }

    function deleteTopic(index) {
      const topic = topics[index];
      if (!topic || !isManualTopic(topic)) return;
      if (!confirm(`删除这个手动选题？\n\n${topic.title}`)) return;

      topics.splice(index, 1);
      saveManualTopics();
      fillSelect();
      renderChips();
      renderCards();
      showToast("已删除选题");
    }

    function showToast(text) {
      toast.textContent = text;
      toast.classList.add("show");
      window.setTimeout(() => toast.classList.remove("show"), 1600);
    }

    function renderCards() {
      const filtered = sortTopics(topics.filter(matchesTopic));
      cardsEl.innerHTML = "";
      emptyState.classList.toggle("show", filtered.length === 0);

      totalCount.textContent = filtered.length;
      topScore.textContent = filtered.length ? Math.max(...filtered.map(item => item.score)) : 0;
      productCount.textContent = new Set(filtered.map(item => item.product)).size;
      resultTitle.textContent = `找到 ${filtered.length} 个可用选题`;

      filtered.forEach(topic => {
        const index = topics.indexOf(topic);
        const card = document.createElement("article");
        card.className = "panel card";
        card.innerHTML = `
          <div class="card-head">
            <div>
              <div class="source">
                <span class="dot"></span>
                <span>${escapeHtml(topic.source)}</span>
                <span>${escapeHtml(topic.date)}</span>
                <span>${escapeHtml(topic.product)}</span>
              </div>
              <h2>${escapeHtml(topic.title)}</h2>
            </div>
            <div class="score">${topic.score}</div>
          </div>
          <p class="value">${escapeHtml(topic.value)}</p>
          ${topic.summary ? `
            <div class="source-summary">
              <strong>摘要</strong>
              <p>${escapeHtml(topic.summary)}</p>
            </div>
          ` : ""}
          <div class="meta-row">
            <div>
              <div class="tag-list">${topic.tags.map(tag => `<span class="tag">${escapeHtml(tag)}</span>`).join("")}</div>
              <div class="platform-list" style="margin-top:8px">${topic.platforms.map(platform => `<span class="platform">${escapeHtml(platform)}</span>`).join("")}</div>
            </div>
            <div class="card-actions">
              ${topic.url ? `<a class="btn small-btn source-link" href="${escapeHtml(topic.url)}" target="_blank" rel="noopener">来源</a>` : ""}
              ${isManualTopic(topic) ? `<button class="btn small-btn" type="button" data-action="edit">编辑</button><button class="btn small-btn danger-btn" type="button" data-action="delete">删除</button>` : ""}
              <button class="btn small-btn" type="button" data-action="toggle">草稿</button>
              <button class="btn small-btn btn-primary" type="button" data-action="copy">复制</button>
            </div>
          </div>
          <div class="draft">
            <div class="draft-grid">
              <div class="draft-box">
                <h3>Hook</h3>
                <p>${escapeHtml(topic.hook)}</p>
              </div>
              <div class="draft-box">
                <h3>English Post Draft</h3>
                <p>${escapeHtml(topic.post)}</p>
              </div>
            </div>
          </div>
        `;

        card.querySelector('[data-action="toggle"]').addEventListener("click", () => {
          card.classList.toggle("open");
        });
        card.querySelector('[data-action="copy"]').addEventListener("click", () => copyTopic(index));
        card.querySelector('[data-action="edit"]')?.addEventListener("click", () => editTopic(index));
        card.querySelector('[data-action="delete"]')?.addEventListener("click", () => deleteTopic(index));
        cardsEl.appendChild(card);
      });
    }

    function exportTopics() {
      const text = topics.map(topicToText).join("\n\n---\n\n");
      const blob = new Blob([text], { type: "text/plain;charset=utf-8" });
      const link = document.createElement("a");
      link.href = URL.createObjectURL(blob);
      link.download = "maeve-content-radar.txt";
      link.click();
      URL.revokeObjectURL(link.href);
    }

    function resetFilters() {
      searchInput.value = "";
      productSelect.value = "all";
      sortSelect.value = "date";
      state.platform = "all";
      state.format = "all";
      renderChips();
      renderCards();
    }

    function addExampleTopic() {
      topics.unshift({
        id: `manual-${Date.now()}`,
        manual: true,
        title: "New ESP32 module idea for smart control panels",
        source: "Manual Input",
        date: new Date().toISOString().slice(0, 10),
        product: "ESP32 Module",
        score: 80,
        formats: ["LinkedIn Post", "Carousel"],
        platforms: ["LinkedIn", "Facebook"],
        tags: ["ESP32", "Control Panel", "Smart Device"],
        value: "A placeholder topic Maeve can edit into a real product story after collecting source material.",
        summary: "A manual idea for turning ESP32-based control panel positioning into social content after product details are confirmed.",
        hook: "A good control panel is not only a screen. It is the interface between users and connected devices.",
        post: "ESP32-based modules can help developers build compact, connected control panels for smart devices.\n\nFor brands working on home automation, industrial control, or connected appliances, the right wireless module can simplify development and improve product reliability.\n\nThis draft can be adapted once product details and target customers are confirmed."
      });
      saveManualTopics();
      fillSelect();
      resetFilters();
      showToast("已添加示例选题");
    }

    searchInput.addEventListener("input", renderCards);
    productSelect.addEventListener("change", renderCards);
    sortSelect.addEventListener("change", renderCards);
    document.getElementById("resetBtn").addEventListener("click", resetFilters);
    document.getElementById("exportBtn").addEventListener("click", exportTopics);
    document.getElementById("addExampleBtn").addEventListener("click", addExampleTopic);

    async function loadTopics() {
      try {
        const res = await fetch("topics.json?ts=" + Date.now());
        if (!res.ok) throw new Error("topics.json not found");
        const data = await res.json();
        if (Array.isArray(data.topics) && data.topics.length > 0) {
          topics = data.topics;
        }
      } catch (error) {
        console.warn("Using embedded sample topics:", error.message);
      }

      topics = [...loadManualTopics(), ...topics];

      fillSelect();
      renderChips();
      renderCards();
    }

    loadTopics();
  </script>
